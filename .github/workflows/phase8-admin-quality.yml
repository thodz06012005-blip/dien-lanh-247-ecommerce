name: Phase 8 Admin Quality

on:
  pull_request:
    branches:
      - main
      - agent/phase-7-customer-account-security
    paths:
      - 'backend/src/common/auth/**'
      - 'backend/src/common/decorators/permissions.decorator.ts'
      - 'backend/src/common/guards/permissions.guard.ts'
      - 'backend/src/modules/auth/**'
      - 'backend/src/modules/dashboard/**'
      - 'backend/src/modules/orders/**'
      - 'backend/src/modules/products/**'
      - 'backend/src/modules/settings/**'
      - 'frontend-admin/src/**'
      - 'tests/architecture/phase8-admin-platform.test.mjs'
      - '.github/workflows/phase8-admin-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase8-admin-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Architecture and Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_ENV: test
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/ecommerce
      JWT_ACCESS_SECRET: phase8_quality_access_secret_more_than_32_characters
      JWT_REFRESH_SECRET: phase8_quality_refresh_secret_more_than_32_characters
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      COOKIE_SECURE: false
      ENABLE_DEV_ENDPOINTS: false
      ENABLE_DEMO_ACCOUNTS: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-user/package-lock.json
            frontend-admin/package-lock.json
            backend/package-lock.json
            mock-api/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix frontend-user ci
          npm --prefix frontend-admin ci
          npm --prefix backend ci
          npm --prefix mock-api ci

      - name: Generate Prisma Client
        run: npm --prefix backend run prisma:generate

      - name: Run lint with diagnostics
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run lint > phase8-lint.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run typecheck with diagnostics
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run typecheck > phase8-typecheck.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run architecture contracts
        id: architecture
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run test:architecture > phase8-architecture.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build all applications
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run build:all > phase8-build.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase8-admin-quality-diagnostics
          path: |
            phase8-lint.log
            phase8-typecheck.log
            phase8-architecture.log
            phase8-build.log
          retention-days: 7

      - name: Fail when quality checks fail
        if: steps.lint.outputs.exit_code != '0' || steps.typecheck.outputs.exit_code != '0' || steps.architecture.outputs.exit_code != '0' || steps.build.outputs.exit_code != '0'
        run: |
          cat phase8-lint.log
          cat phase8-typecheck.log
          cat phase8-architecture.log
          cat phase8-build.log
          exit 1
