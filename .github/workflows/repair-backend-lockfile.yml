name: Repair Backend Lockfile

on:
  push:
    branches:
      - agent/phase-2-project-architecture
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-backend-lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    name: Regenerate and commit backend package lock
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-2-project-architecture
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Regenerate backend lockfile with npm
        run: npm --prefix backend install --package-lock-only --ignore-scripts

      - name: Commit repaired lockfile when changed
        shell: bash
        run: |
          if git diff --quiet -- backend/package-lock.json; then
            echo "Backend lockfile is already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/package-lock.json
          git commit -m "build: repair backend dependency lockfile"
          git push origin HEAD:agent/phase-2-project-architecture
