name: Phase 7 Customer Account Integration

on:
  pull_request:
    branches:
      - main
      - agent/phase-6-service-request-lifecycle
    paths:
      - 'backend/prisma/**'
      - 'backend/src/modules/auth/**'
      - 'backend/src/modules/users/**'
      - 'backend/src/integrations/mail/**'
      - 'backend/test/phase7-customer-account.integration.mjs'
      - 'backend/test/smtp-capture.mjs'
      - 'frontend-user/src/pages/Account.tsx'
      - 'frontend-user/src/pages/Login.tsx'
      - 'frontend-user/src/pages/Register.tsx'
      - 'frontend-user/src/pages/ForgotPassword.tsx'
      - 'frontend-user/src/pages/ResetPassword.tsx'
      - 'frontend-user/src/pages/VerifyEmail.tsx'
      - 'frontend-user/src/pages/Orders.tsx'
      - 'frontend-user/src/pages/MyServices.tsx'
      - 'frontend-user/src/pages/MyServiceDetail.tsx'
      - 'frontend-user/src/router/AppRouter.tsx'
      - 'frontend-user/src/services/**'
      - 'frontend-user/src/store/authStore.ts'
      - 'tests/architecture/phase7-customer-account-security.test.mjs'
      - '.github/workflows/phase7-customer-account-integration.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase7-customer-account-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  account-integration:
    name: Migrate, Run Auth API and Verify Ownership
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ecommerce
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/ecommerce
      NODE_ENV: test
      HOST: 0.0.0.0
      PORT: 3000
      API_PREFIX: api/v1
      LOG_LEVEL: warn
      SWAGGER_ENABLED: false
      TRUST_PROXY: false
      ADMIN_SEED_EMAIL: admin@dienlanh247.vn
      ADMIN_SEED_PASSWORD: Phase7AdminSecure123
      ADMIN_NAME: Phase 7 Admin
      JWT_ACCESS_SECRET: phase7_access_secret_for_customer_integration_123456789
      JWT_REFRESH_SECRET: phase7_refresh_secret_for_customer_integration_12345678
      JWT_EXPIRES_IN: 2s
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 8
      COOKIE_SECURE: false
      COOKIE_SAME_SITE: strict
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      FRONTEND_USER_URL: http://localhost:5173
      FRONTEND_ADMIN_URL: http://localhost:5174
      THROTTLE_TTL_MS: 60000
      THROTTLE_LIMIT: 500
      ENABLE_DEV_ENDPOINTS: false
      ENABLE_DEMO_ACCOUNTS: true
      LOGIN_RATE_LIMIT_WINDOW_MS: 900000
      LOGIN_RATE_LIMIT_MAX_PER_EMAIL: 3
      LOGIN_RATE_LIMIT_MAX_PER_IP: 100
      LOGIN_RATE_LIMIT_MAX_PER_IP_EMAIL: 3
      LOGIN_RATE_LIMIT_LOCK_MS: 900000
      AUDIT_LOG_ENABLED: true
      DANGEROUS_ACTION_CONFIRMATION_REQUIRED: true
      SOFT_DELETE_ENABLED: true
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 2525
      SMTP_CAPTURE_PORT: 2525
      SMTP_CAPTURE_FILE: phase7-emails.log
      PHASE7_API_URL: http://127.0.0.1:3000/api/v1
      PHASE7_API_LOG: phase7-api.log

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Wait for MySQL
        run: |
          for attempt in {1..60}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          echo 'MySQL did not become ready' >&2
          exit 1

      - name: Validate Prisma and apply all migrations
        run: |
          npm --prefix backend run prisma:validate
          npm --prefix backend run prisma:generate
          npm --prefix backend run prisma:migrate:deploy

      - name: Seed platform data twice
        run: |
          npm --prefix backend run prisma:seed
          npm --prefix backend run prisma:seed

      - name: Build backend
        run: npm --prefix backend run build

      - name: Start SMTP capture
        run: |
          node backend/test/smtp-capture.mjs > phase7-smtp.log 2>&1 &
          echo $! > phase7-smtp.pid
          for attempt in {1..30}; do
            if nc -z 127.0.0.1 2525; then exit 0; fi
            sleep 1
          done
          cat phase7-smtp.log || true
          exit 1

      - name: Start backend API
        run: |
          npm --prefix backend run start:prod > phase7-api.log 2>&1 &
          echo $! > phase7-api.pid

      - name: Wait for backend API
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/v1 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat phase7-api.log || true
          exit 1

      - name: Run customer account integration
        run: node backend/test/phase7-customer-account.integration.mjs | tee phase7-integration.log

      - name: Verify database security records
        run: |
          mysql -h 127.0.0.1 -uroot -proot ecommerce -e "SELECT id, userId, familyId, LENGTH(refreshTokenHash) AS hashLength, revokedAt, revokeReason FROM AuthSession ORDER BY createdAt DESC LIMIT 12;"
          mysql -h 127.0.0.1 -uroot -proot ecommerce -e "SELECT userId, type, readAt, createdAt FROM CustomerNotification ORDER BY id DESC LIMIT 12;"
          mysql -h 127.0.0.1 -uroot -proot ecommerce -e "SELECT id, customerUserId, workflowStatus FROM ServiceRequest WHERE customerUserId IS NOT NULL ORDER BY createdAt DESC LIMIT 12;"

      - name: Reject token-shaped data in API logs
        run: |
          if grep -E 'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+' phase7-api.log; then
            echo 'JWT-like token found in API log' >&2
            exit 1
          fi

      - name: Upload Phase 7 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase7-customer-account-diagnostics
          path: |
            phase7-api.log
            phase7-smtp.log
            phase7-integration.log
            backend/prisma/migrations/20260714100000_phase7_customer_account_security/migration.sql
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          if [ -f phase7-api.pid ]; then kill "$(cat phase7-api.pid)" 2>/dev/null || true; fi
          if [ -f phase7-smtp.pid ]; then kill "$(cat phase7-smtp.pid)" 2>/dev/null || true; fi
