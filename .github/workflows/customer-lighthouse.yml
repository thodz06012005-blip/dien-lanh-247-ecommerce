name: Customer Lighthouse

on:
  push:
    branches:
      - 'agent/phase-4-*'
      - 'agent/phase-13-*'
    paths:
      - 'frontend-user/**'
      - 'mock-api/**'
      - 'scripts/verify-lighthouse.mjs'
      - 'scripts/summarize-lighthouse.mjs'
      - '.github/workflows/customer-lighthouse.yml'
  pull_request:
    paths:
      - 'frontend-user/**'
      - 'mock-api/**'
      - 'scripts/verify-lighthouse.mjs'
      - 'scripts/summarize-lighthouse.mjs'
      - '.github/workflows/customer-lighthouse.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Build, Preview and Audit Customer Web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            frontend-user/package-lock.json
            mock-api/package-lock.json

      - name: Install customer dependencies
        run: npm --prefix frontend-user ci

      - name: Install Mock API dependencies
        run: npm --prefix mock-api ci

      - name: Start Mock API
        env:
          PORT: '3001'
          ENABLE_DEV_ENDPOINTS: 'true'
          ENABLE_DEMO_ACCOUNTS: 'true'
          CORS_ORIGINS: http://127.0.0.1:4173,http://localhost:4173
        run: |
          node mock-api/server.js > mock-api-lighthouse.log 2>&1 &
          echo $! > mock-api-lighthouse.pid

      - name: Wait for API
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3001/api/v1/health > /dev/null; then
              echo "Mock API is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Mock API did not become ready."
          cat mock-api-lighthouse.log || true
          exit 1

      - name: Build customer website and generated sitemap
        shell: bash
        env:
          VITE_APP_NAME: Điện Lạnh 247
          VITE_APP_ENV: test
          VITE_APP_URL: http://127.0.0.1:4173
          VITE_SITE_URL: http://127.0.0.1:4173
          VITE_API_BASE_URL: http://127.0.0.1:3001/api/v1
          VITE_CONTENT_API_BASE_URL: http://127.0.0.1:3001/api/v1
          SITEMAP_API_URL: http://127.0.0.1:3001/api/v1
          VITE_API_TIMEOUT_MS: '15000'
          VITE_USE_MOCK_API: 'true'
          VITE_USE_MOCK: 'true'
          VITE_ENABLE_QUERY_DEVTOOLS: 'false'
        run: |
          set -o pipefail
          npm --prefix frontend-user run build 2>&1 | tee customer-build.log

      - name: Start customer preview
        run: |
          npm --prefix frontend-user run preview -- --host 127.0.0.1 --port 4173 > customer-preview.log 2>&1 &
          echo $! > customer-preview.pid

      - name: Wait for customer preview
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              echo "Customer preview is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Customer preview did not become ready."
          cat customer-preview.log || true
          exit 1

      - name: Run Phase 13 Lighthouse route matrix
        shell: bash
        run: |
          set -uo pipefail
          failures=0

          audit_route() {
            local label="$1"
            local route="$2"
            local profile="$3"
            local preset_args=()
            if [ "$profile" = "desktop" ]; then
              preset_args+=(--preset=desktop)
            fi

            echo "Auditing $label ($profile): $route"
            if ! npx --yes lighthouse@13.0.0 "http://127.0.0.1:4173${route}" \
              --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
              --only-categories=performance,accessibility,best-practices,seo \
              "${preset_args[@]}" \
              --output=json \
              --output-path="lighthouse-${label}-${profile}.json" \
              --quiet; then
              echo "Lighthouse execution failed for ${label}-${profile}."
              failures=$((failures + 1))
              return
            fi

            if ! node scripts/verify-lighthouse.mjs "lighthouse-${label}-${profile}.json" "--profile=${profile}"; then
              failures=$((failures + 1))
            fi
          }

          audit_route home / mobile
          audit_route services /services mobile
          audit_route products /products mobile
          audit_route articles /articles mobile
          audit_route booking /service-booking mobile
          audit_route home / desktop

          if [ "$failures" -gt 0 ]; then
            echo "$failures Lighthouse route profile(s) did not meet Phase 13 acceptance."
            exit 1
          fi

      - name: Create performance report
        if: always()
        shell: bash
        run: |
          reports=(lighthouse-*.json)
          if [ -e "${reports[0]}" ]; then
            node scripts/summarize-lighthouse.mjs "${reports[@]}"
          else
            echo "No Lighthouse reports were generated."
          fi

      - name: Upload Lighthouse and Core Web Vitals reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-lighthouse-phase13-report
          path: |
            lighthouse-*.json
            phase13-performance-report.json
            phase13-performance-report.md
            frontend-user/public/sitemap.xml
            customer-build.log
            customer-preview.log
            mock-api-lighthouse.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop preview services
        if: always()
        shell: bash
        run: |
          if [ -f customer-preview.pid ]; then
            kill "$(cat customer-preview.pid)" 2>/dev/null || true
          fi
          if [ -f mock-api-lighthouse.pid ]; then
            kill "$(cat mock-api-lighthouse.pid)" 2>/dev/null || true
          fi
