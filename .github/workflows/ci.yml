name: Continuous Integration

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'security/**'
      - 'agent/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  HOST: 127.0.0.1
  PORT: 3000
  API_PREFIX: api/v1
  DATABASE_URL: mysql://root:ci_password@127.0.0.1:3306/ecommerce_ci
  JWT_ACCESS_SECRET: ci_access_secret_with_more_than_thirty_two_characters
  JWT_REFRESH_SECRET: ci_refresh_secret_with_more_than_thirty_two_characters
  ADMIN_SEED_EMAIL: admin-ci@dienlanh247.vn
  ADMIN_SEED_PASSWORD: ci_seed_password_123456
  CORS_ORIGINS: http://localhost:5173,http://localhost:5174
  ENABLE_DEV_ENDPOINTS: 'false'
  ENABLE_DEMO_ACCOUNTS: 'false'
  COOKIE_SECURE: 'false'

jobs:
  verify:
    name: Install, Lint, Typecheck, Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-user/package-lock.json
            frontend-admin/package-lock.json
            backend/package-lock.json
            mock-api/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install customer frontend dependencies
        run: npm --prefix frontend-user ci

      - name: Install admin frontend dependencies
        run: npm --prefix frontend-admin ci

      - name: Install backend dependencies
        id: backend-install
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm --prefix backend ci > backend-install.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload backend install diagnostics
        if: steps.backend-install.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: backend-install-log
          path: backend-install.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when backend dependency installation fails
        if: steps.backend-install.outputs.exit_code != '0'
        shell: bash
        run: |
          cat backend-install.log
          exit 1

      - name: Install Mock API dependencies
        run: npm --prefix mock-api ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Validate repository architecture and secret rules
        run: npm run validate:repo

      - name: Run linters
        run: npm run lint

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Run architecture tests
        run: npm run test:architecture

      - name: Build all applications
        run: npm run build:all

      - name: Run Mock API business tests
        run: npm run test:mock
